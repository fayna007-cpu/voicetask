<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1252c4"/>
      <stop offset="60%" stop-color="#1a56db"/>
      <stop offset="100%" stop-color="#2e7eea"/>
    </linearGradient>
    <radialGradient id="shine" cx="38%" cy="28%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-sm">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <!-- Inner shine -->
  <rect width="512" height="512" rx="115" fill="url(#shine)"/>

  <!-- Soft glow behind mic -->
  <ellipse cx="240" cy="230" rx="130" ry="160" fill="white" opacity=".07" filter="url(#blur-sm)"/>

  <!-- Mic body — clean rounded rect -->
  <rect x="188" y="82" width="136" height="218" rx="68" fill="white"/>

  <!-- Mic inner highlight (gives depth) -->
  <rect x="208" y="92" width="56" height="110" rx="28" fill="white" opacity=".35"/>

  <!-- Mic stand arc -->
  <path d="M140 276 C140 382 372 382 372 276"
        fill="none" stroke="white" stroke-width="32"
        stroke-linecap="round"/>

  <!-- Stem -->
  <line x1="256" y1="379" x2="256" y2="428"
        stroke="white" stroke-width="32" stroke-linecap="round"/>

  <!-- Base -->
  <line x1="182" y1="428" x2="330" y2="428"
        stroke="white" stroke-width="32" stroke-linecap="round"/>

  <!-- Sound wave 1 (inner) -->
  <path d="M374 196 C410 222 410 300 374 326"
        fill="none" stroke="white" stroke-width="24"
        stroke-linecap="round" opacity=".80"/>

  <!-- Sound wave 2 (outer) -->
  <path d="M406 164 C460 202 460 320 406 358"
        fill="none" stroke="white" stroke-width="18"
        stroke-linecap="round" opacity=".42"/>

  <!-- Checkmark badge -->
  <circle cx="370" cy="390" r="60" fill="#0f172a" opacity=".25"/>
  <circle cx="370" cy="390" r="54" fill="#22c55e"/>
  <circle cx="370" cy="390" r="44" fill="#16a34a"/>
  <!-- Check mark -->
  <polyline points="347,390 363,407 395,372"
            fill="none" stroke="white" stroke-width="17"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
