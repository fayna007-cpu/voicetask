<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>VoiceTask</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="VoiceTask">
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f0f5;--surface:#fff;
  --border:#e4e4e9;--border2:#d0d0d8;
  --text:#0a0a0a;--muted:#7a7a82;
  --accent:#6366f1;--accent2:#818cf8;
  --r:20px;--r-sm:14px;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px);--sar:env(safe-area-inset-right,0px);
}
html{height:100%;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,'SF Pro Display','Segoe UI',Arial,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100svh;max-width:480px;margin:0 auto;
  padding:0 0 calc(120px + var(--sab));
  padding-left:var(--sal);padding-right:var(--sar);
  direction:rtl;overflow-x:hidden;
  overscroll-behavior-y:none;-webkit-user-select:none;user-select:none;
}
.ico{display:block;flex-shrink:0}

/* ── Login ── */
#loginScreen{
  position:fixed;inset:0;z-index:200;background:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 32px;
}
#loginScreen.hidden{display:none}
.login-orb{
  width:140px;height:140px;border-radius:50%;
  background:conic-gradient(from 0deg,#c084fc,#818cf8,#38bdf8,#34d399,#fbbf24,#f87171,#c084fc);
  animation:orb-spin 4s linear infinite;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:32px;
  box-shadow:0 20px 60px rgba(99,102,241,.35);
  position:relative;
}
.login-orb::after{
  content:'🎤';font-size:48px;
  position:absolute;
  width:116px;height:116px;border-radius:50%;
  background:radial-gradient(circle at 38% 35%,rgba(255,255,255,.5) 0%,transparent 55%),
             conic-gradient(from 180deg,#c084fc,#818cf8,#38bdf8,#34d399,#fbbf24,#f87171,#c084fc);
  display:flex;align-items:center;justify-content:center;
  animation:orb-spin 4s linear infinite reverse;
}
@keyframes orb-spin{to{transform:rotate(360deg)}}
.login-title{font-size:34px;font-weight:800;color:#0a0a0a;margin-bottom:10px;letter-spacing:-1px;text-align:center}
.login-sub{font-size:15px;color:#7a7a82;margin-bottom:48px;text-align:center;line-height:1.7;max-width:280px}
.google-btn{
  display:flex;align-items:center;gap:12px;
  padding:15px 32px;border-radius:50px;
  background:#fff;color:#0a0a0a;border:2px solid #e4e4e9;
  font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;
  box-shadow:0 4px 24px rgba(0,0,0,.08);
  transition:transform .12s;touch-action:manipulation;-webkit-tap-highlight-color:transparent;
}
.google-btn:active{transform:scale(.96)}
.google-icon{width:22px;height:22px;flex-shrink:0}
.login-terms{margin-top:20px;font-size:12px;color:#c0c0c8;text-align:center;max-width:260px}
.login-or{
  margin:24px 0 20px;font-size:13px;color:var(--muted);
  display:flex;align-items:center;gap:12px;width:100%;max-width:320px;
}
.login-or::before,.login-or::after{content:'';flex:1;height:1px;background:var(--border)}
.login-email-form{display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px}
.login-input{
  width:100%;padding:14px 18px;border-radius:50px;
  border:2px solid var(--border);background:#fff;
  font-size:15px;font-family:inherit;color:var(--text);
  outline:none;transition:border-color .2s;direction:rtl;text-align:right;
}
.login-input:focus{border-color:var(--accent)}
.login-submit{
  padding:15px;border-radius:50px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;border:none;font-size:16px;font-weight:700;
  cursor:pointer;font-family:inherit;
  transition:opacity .15s;touch-action:manipulation;-webkit-tap-highlight-color:transparent;
}
.login-submit:active{opacity:.85}

/* ── Header ── */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(16px + var(--sat)) 20px 14px;
  background:rgba(240,240,245,.92);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  position:sticky;top:0;z-index:20;
  border-bottom:1px solid rgba(228,228,233,.6);
}
.logo-wrap{display:flex;align-items:center;gap:9px}
.logo-icon{
  width:32px;height:32px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(99,102,241,.3);
}
.logo{font-size:19px;font-weight:800;letter-spacing:-.5px;color:var(--text)}
.header-right{display:flex;align-items:center;gap:9px}
.badge{font-size:12px;font-weight:700;color:var(--muted);background:var(--surface);border:1.5px solid var(--border);padding:5px 12px;border-radius:20px}
.user-chip{
  display:flex;align-items:center;gap:7px;
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:50px;padding:4px 12px 4px 4px;
  cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:background .15s;
}
.user-chip:active{background:var(--bg)}
.user-avatar{width:27px;height:27px;border-radius:50%;object-fit:cover}
.user-initials{width:27px;height:27px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#67e8f9);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.user-name-chip{font-size:12px;font-weight:600;color:var(--text);max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Mic button (tap to open Siri) ── */
.mic-wrap{display:flex;flex-direction:column;align-items:center;padding:28px 20px 16px;gap:14px}
.tap-orb{
  width:110px;height:110px;border-radius:50%;
  background:conic-gradient(from 0deg,#c084fc,#818cf8,#38bdf8,#34d399,#fbbf24,#f87171,#c084fc);
  animation:orb-spin 6s linear infinite;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;
  box-shadow:0 16px 48px rgba(99,102,241,.28);
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  transition:transform .15s,box-shadow .3s;
}
.tap-orb:active{transform:scale(.93)}
.tap-orb-inner{
  width:90px;height:90px;border-radius:50%;
  background:radial-gradient(circle at 38% 35%,rgba(255,255,255,.45) 0%,transparent 55%),
             conic-gradient(from 180deg,#c084fc,#818cf8,#38bdf8,#34d399,#fbbf24,#f87171,#c084fc);
  animation:orb-spin 6s linear infinite reverse;
  display:flex;align-items:center;justify-content:center;
}
.tap-lbl{font-size:14px;color:var(--muted);font-weight:600;letter-spacing:-.1px}

/* ── Siri Overlay ── */
#siriOverlay{
  position:fixed;inset:0;z-index:100;
  display:flex;flex-direction:column;
  pointer-events:none;opacity:0;
  transition:opacity .35s ease;
}
#siriOverlay.on{opacity:1;pointer-events:all}
.siri-bg{
  position:absolute;inset:0;
  background:rgba(0,0,0,.82);
  backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
}
.siri-content{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  justify-content:flex-end;
  height:100%;
  padding-bottom:calc(48px + var(--sab));
}

/* Transcript text in overlay */
.siri-text{
  width:100%;max-width:340px;
  min-height:64px;
  text-align:center;
  font-size:22px;font-weight:700;color:#fff;
  letter-spacing:-.3px;line-height:1.4;
  margin-bottom:20px;
  padding:0 24px;
  transition:opacity .2s;
}
.siri-text.muted{color:rgba(255,255,255,.45);font-size:16px;font-weight:500}

/* Commands hint */
.siri-hints{
  display:flex;flex-wrap:wrap;justify-content:center;gap:8px;
  margin-bottom:32px;padding:0 20px;
  max-width:380px;
}
.siri-hint-chip{
  font-size:12px;font-weight:600;color:rgba(255,255,255,.55);
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);
  border-radius:50px;padding:5px 12px;
}

/* Siri waveform bars */
.siri-wave{
  display:flex;align-items:center;gap:4px;
  height:56px;margin-bottom:36px;
}
.siri-bar{
  width:4px;border-radius:4px;
  background:linear-gradient(to top,#818cf8,#c084fc,#38bdf8);
  transform-origin:bottom;
  animation:bar-idle 1.8s ease-in-out infinite;
  height:8px;
}
@keyframes bar-idle{0%,100%{height:8px;opacity:.4}50%{height:20px;opacity:.7}}
.siri-wave.speaking .siri-bar{animation:bar-speak var(--d,.6s) ease-in-out infinite alternate}
@keyframes bar-speak{from{height:6px}to{height:var(--h,40px)}}

/* Siri orb */
.siri-orb{
  width:170px;height:170px;border-radius:50%;
  position:relative;margin-bottom:40px;
  animation:orb-breathe 2.2s ease-in-out infinite;
}
@keyframes orb-breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.siri-orb.speaking{animation:orb-pulse .5s ease-in-out infinite alternate}
@keyframes orb-pulse{from{transform:scale(1)}to{transform:scale(1.09)}}
.siri-orb-spin{
  position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(from 0deg,#c084fc,#818cf8,#38bdf8,#34d399,#fbbf24,#f87171,#ec4899,#c084fc);
  animation:orb-spin 3s linear infinite;
}
.siri-orb-inner{
  position:absolute;inset:5px;border-radius:50%;
  background:radial-gradient(circle at 38% 35%,rgba(255,255,255,.45) 0%,transparent 55%),
             conic-gradient(from 200deg,#818cf8,#38bdf8,#34d399,#fbbf24,#f87171,#c084fc,#818cf8);
  animation:orb-spin 3s linear infinite reverse;
}
.siri-orb-glow{
  position:absolute;inset:-20px;border-radius:50%;
  background:radial-gradient(circle,rgba(129,140,248,.35) 0%,transparent 70%);
  animation:glow-pulse 2s ease-in-out infinite;
}
@keyframes glow-pulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}

/* Siri cancel button */
.siri-cancel{
  display:flex;align-items:center;justify-content:center;
  width:56px;height:56px;border-radius:50%;
  background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.2);
  color:#fff;font-size:14px;font-weight:600;
  cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;
  transition:background .15s,transform .1s;
  margin-bottom:8px;
}
.siri-cancel:active{background:rgba(255,255,255,.22);transform:scale(.93)}

/* Transcript confirm sheet (slides up after final result) */
.siri-confirm{
  position:absolute;bottom:0;left:0;right:0;
  background:#1a1a1a;
  border-radius:24px 24px 0 0;
  padding:20px 20px calc(24px + var(--sab));
  transform:translateY(100%);
  transition:transform .36s cubic-bezier(.34,1.56,.64,1);
  display:flex;flex-direction:column;gap:12px;
}
.siri-confirm.on{transform:translateY(0)}
.siri-confirm-edit{
  background:#2a2a2a;border:1.5px solid #3a3a3a;
  border-radius:14px;padding:12px 14px;
  font-size:16px;line-height:1.5;color:#fff;
  resize:none;width:100%;font-family:inherit;direction:rtl;
  outline:none;min-height:70px;
  -webkit-user-select:text;user-select:text;
}
.siri-confirm-edit:focus{border-color:#818cf8}
.siri-confirm-actions{display:flex;gap:8px}
.siri-confirm-save{
  flex:1;padding:14px;border-radius:50px;
  background:linear-gradient(135deg,#818cf8,#c084fc);color:#fff;border:none;
  font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;
  transition:opacity .15s;
}
.siri-confirm-save:active{opacity:.8}
.siri-confirm-cancel{
  padding:14px 20px;border-radius:50px;
  background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);
  border:1.5px solid rgba(255,255,255,.12);
  font-size:15px;cursor:pointer;font-family:inherit;
}

/* ── Quick Actions ── */
.quick-wrap{display:flex;gap:8px;overflow-x:auto;padding:0 20px 4px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.quick-wrap::-webkit-scrollbar{display:none}
.quick-btn{
  flex-shrink:0;display:flex;align-items:center;gap:6px;
  padding:9px 16px;border-radius:50px;
  border:1.5px solid var(--border);background:var(--surface);
  color:var(--text);font-size:13px;font-weight:600;cursor:pointer;
  transition:all .16s;font-family:inherit;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;white-space:nowrap;
}
.quick-btn:active{transform:scale(.94);background:var(--bg)}
.quick-btn svg{opacity:.55}

/* ── Filters ── */
.filters{display:flex;gap:7px;overflow-x:auto;padding:14px 20px 16px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.f-btn{
  flex-shrink:0;padding:8px 16px;border-radius:50px;
  border:1.5px solid var(--border);background:var(--surface);
  color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;
  transition:all .18s;font-family:inherit;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;min-height:36px;
}
.f-btn.on{background:var(--text);border-color:var(--text);color:#fff;font-weight:700}

/* ── Section ── */
.sec{display:flex;justify-content:space-between;align-items:center;padding:0 20px 10px}
.sec-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px}
.sec-btn{display:flex;align-items:center;gap:5px;font-size:12px;color:#ef4444;background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 0;min-height:36px;touch-action:manipulation;font-weight:600}

/* ── Task List ── */
.list{display:flex;flex-direction:column;gap:10px;padding:0 20px}

/* ── Card ── */
.card{
  background:var(--surface);border:1px solid rgba(228,228,233,.8);
  border-radius:var(--r);border-right:3px solid var(--cc,var(--accent));
  padding:16px;position:relative;
  animation:slide .28s cubic-bezier(.25,.46,.45,.94);
  box-shadow:0 2px 16px rgba(0,0,0,.05);
  transition:opacity .25s,box-shadow .2s;
}
.card:hover{box-shadow:0 4px 24px rgba(0,0,0,.08)}
@keyframes slide{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.card.done{opacity:.4}
.card.done .task-txt{text-decoration:line-through;color:var(--muted)}
.task-txt{font-size:15px;line-height:1.55;font-weight:600;color:var(--text);margin-bottom:10px;-webkit-user-select:text;user-select:text}
.date-block{background:var(--bg);border-radius:var(--r-sm);padding:8px 12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.date-main{font-size:17px;font-weight:800;color:var(--text);letter-spacing:-.3px}
.date-sub{font-size:11px;color:var(--muted);margin-top:1px}
.cal-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:4px}
.cal-badge.synced{background:#dcfce7;color:#16a34a}
.cal-badge.pending{background:#fef9c3;color:#b45309}
.meta{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.cat-sel{background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:12px;font-weight:600;border-radius:20px;padding:5px 12px;font-family:inherit;cursor:pointer;outline:none;-webkit-appearance:none;appearance:none;min-height:30px}
.actions{display:flex;gap:6px;justify-content:flex-end}
.act{
  width:36px;height:36px;border-radius:50%;
  border:1.5px solid var(--border);background:var(--bg);color:var(--muted);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:transform .1s,background .15s,color .15s,border-color .15s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.act:active{transform:scale(.8)}
.act.done-btn:active{background:#dcfce7;border-color:#bbf7d0;color:#16a34a}
.act.edit-btn:active{background:#ede9fe;border-color:#ddd6fe;color:var(--accent)}
.act.wa-btn:active{background:#dcfce7;border-color:#bbf7d0;color:#16a34a}
.act.cal-btn:active{background:#dbeafe;border-color:#bfdbfe;color:#2563eb}
.act.del-btn{border-color:#fecaca;color:#f87171}
.act.del-btn:active{background:#fee2e2;color:#ef4444}
.act.call-btn:active{background:#dcfce7;border-color:#bbf7d0;color:#16a34a}
.card-edit{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);flex-direction:column;gap:8px;animation:fade-in .2s ease}
.card-edit.on{display:flex}
.edit-txt{background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--r-sm);padding:10px 12px;font-size:14px;line-height:1.5;color:var(--text);resize:none;width:100%;font-family:inherit;direction:rtl;outline:none;min-height:60px;-webkit-user-select:text;user-select:text}
.edit-txt:focus{border-color:var(--accent)}
.edit-dt{background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--r-sm);padding:9px 12px;font-size:13px;color:var(--text);font-family:inherit;outline:none;width:100%}
.edit-dt:focus{border-color:var(--accent)}
.edit-actions{display:flex;gap:7px}
.edit-save{flex:1;padding:10px;border-radius:50px;background:var(--text);color:#fff;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.edit-cancel{padding:10px 16px;border-radius:50px;background:transparent;color:var(--muted);border:1.5px solid var(--border);font-size:13px;cursor:pointer;font-family:inherit}

/* ── Install / Toast ── */
.install-bar{position:fixed;bottom:calc(16px + var(--sab));left:16px;right:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;display:none;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,.1);z-index:50;max-width:448px;margin:0 auto}
.install-bar.on{display:flex}
.install-bar span{flex:1;font-size:13px;font-weight:600;color:var(--text)}
.install-bar button{padding:8px 16px;border-radius:50px;border:none;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;touch-action:manipulation}
.btn-install{background:var(--text);color:white}
.btn-dismiss{background:transparent;color:var(--muted);font-size:18px;padding:4px 8px}
.empty{text-align:center;padding:52px 20px;color:var(--muted)}
.empty-icon{font-size:44px;display:block;margin-bottom:14px;opacity:.35}
.empty p{font-size:14px;line-height:1.7}
.divider{height:1px;background:var(--border);margin:4px 20px 12px;opacity:.6}
.toast{
  position:fixed;bottom:calc(28px + var(--sab));left:50%;
  transform:translateX(-50%) translateY(120px);
  background:var(--text);color:#fff;
  padding:12px 26px;border-radius:50px;font-size:14px;font-weight:600;
  box-shadow:0 8px 32px rgba(0,0,0,.2);z-index:200;
  transition:transform .32s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;
}
.toast.on{transform:translateX(-50%) translateY(0)}
@keyframes fade-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
  <div class="login-orb"></div>
  <div class="login-title">VoiceTask</div>

// ── Auth ──────────────────────────────────────────────────────────────────────
function initAuth(){
  const s=JSON.parse(localStorage.getItem('vt_auth')||'null');
  if(s&&s.email&&(!s.expiry||s.expiry>Date.now()+60000)){gAuth=s;showApp();return;}

function signInWithGoogle(){
  if(!window.google){toast('טוען...');setTimeout(signInWithGoogle,800);return;}
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:GOOGLE_CLIENT_ID,scope:SCOPES,
    callback:async(resp)=>{
      if(resp.error){toast('שגיאת התחברות');return;}
      try{
        const r=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+resp.access_token}});
        const u=await r.json();
        gAuth={access_token:resp.access_token,email:u.email||'',name:u.name||u.email||'',picture:u.picture||'',expiry:Date.now()+(+(resp.expires_in||3600))*1000};
        localStorage.setItem('vt_auth',JSON.stringify(gAuth));showApp();
      }catch(e){toast('שגיאה');}
    }
  });
  tokenClient.requestAccessToken({prompt:'consent'});
}
function registerWithEmail(){
  const name=document.getElementById('regName').value.trim();
  const email=document.getElementById('regEmail').value.trim();
  if(!name){toast('נא להזין שם');return;}
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){toast('נא להזין אימייל תקין');return;}
  gAuth={email,name,picture:''};
  localStorage.setItem('vt_auth',JSON.stringify(gAuth));showApp();
}
function showApp(){document.getElementById('loginScreen').classList.add('hidden');document.getElementById('app').style.display='';updateUserChip();render();updateBadge()}
function showLogin(){document.getElementById('loginScreen').classList.remove('hidden');document.getElementById('app').style.display='none'}
function updateUserChip(){
  if(!gAuth)return;
  const chip=document.getElementById('userChip');
  const av=gAuth.picture?`<img class="user-avatar" src="${gAuth.picture}" referrerpolicy="no-referrer">`:`<div class="user-initials">${(gAuth.name||'?')[0].toUpperCase()}</div>`;
  chip.innerHTML=av+`<span class="user-name-chip">${esc((gAuth.name||'').split(' ')[0]||gAuth.email.split('@')[0])}</span>`;
}
function confirmSignOut(){if(confirm('להתנתק?'))signOut()}
function signOut(){if(gAuth?.access_token&&window.google)google.accounts.oauth2.revoke(gAuth.access_token,()=>{});gAuth=null;localStorage.removeItem('vt_auth');showLogin()}
async function getToken(){
  if(!gAuth?.access_token)return null;
  if(gAuth.expiry>Date.now()+60000)return gAuth.access_token;
  return new Promise(resolve=>{
    if(!tokenClient)tokenClient=google.accounts.oauth2.initTokenClient({client_id:GOOGLE_CLIENT_ID,scope:SCOPES,callback:()=>{}});
    const prev=tokenClient.callback;
    tokenClient.callback=(resp)=>{
      tokenClient.callback=prev;
      if(resp.error){resolve(null);return;}
      gAuth.access_token=resp.access_token;gAuth.expiry=Date.now()+(+(resp.expires_in||3600))*1000;
      localStorage.setItem('vt_auth',JSON.stringify(gAuth));resolve(resp.access_token);
    };
    tokenClient.requestAccessToken({prompt:''});
  });
}

// ── Google Calendar API ───────────────────────────────────────────────────────
async function createCalendarEvent(task){
  const token=await getToken();if(!token)return null;
  const end=new Date(new Date(task.datetime).getTime()+3600000).toISOString();
  try{
    const res=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events',{
      method:'POST',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
      body:JSON.stringify({summary:task.text,description:`קטגוריה: ${task.category}\nנוצר מ-VoiceTask 🎤`,start:{dateTime:task.datetime},end:{dateTime:end}})
    });
    if(!res.ok)return null;const d=await res.json();return d.id||null;
  }catch(e){return null;}
}
async function deleteCalendarEvent(eventId){
  const token=await getToken();if(!token||!eventId)return;
  try{await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${eventId}`,{method:'DELETE',headers:{'Authorization':'Bearer '+token}});}catch(e){}
}

// ── Voice Commands ────────────────────────────────────────────────────────────
function parseVoiceCommand(text){
  const t=text.trim();
  // מחק [task]
  const del=/^(?:מחק|תמחק|מחקי|תמחקי)\s+(.+)$/.exec(t);
  if(del)return{action:'delete',query:del[1]};
  // סיים / סמן [task]
  const done=/^(?:סיים|תסיים|סמן|תסמן|סמני)\s+(.+?)(?:\s+כהושלם)?$/.exec(t);
  if(done)return{action:'done',query:done[1]};
  // הראה / פתח [filter]
  if(/^(?:הראה|פתח|תראה)\s+(?:הכל|כולם|כל\s+המשימות)$/.test(t))return{action:'filter',value:'all'};
  if(/מקצועי|עבודה/.test(t)&&/הראה|פתח/.test(t))return{action:'filter',value:'מקצועי'};
  if(/אישי/.test(t)&&/הראה|פתח/.test(t))return{action:'filter',value:'אישי'};
  // Not a command
  return null;
}

function findTaskByQuery(query){
  const q=query.toLowerCase();
  return tasks.find(t=>t.text.toLowerCase().includes(q)&&!t.completed);
}

function executeCommand(cmd){
  if(cmd.action==='delete'){
    const t=findTaskByQuery(cmd.query);
    if(t){del(t.id);toast('משימה נמחקה');stopSiri();}
    else{showSiriFeedback('לא מצאתי משימה כזו');}
    return;
  }
  if(cmd.action==='done'){
    const t=findTaskByQuery(cmd.query);
    if(t){toggleDone(t.id);toast('סומנה כהושלמה');stopSiri();}
    else{showSiriFeedback('לא מצאתי משימה כזו');}
    return;
  }
  if(cmd.action==='filter'){
    stopSiri();
    const btns=document.querySelectorAll('.f-btn');
    btns.forEach(b=>{if(b.textContent.includes(cmd.value==='all'?'הכל':cmd.value))b.click()});
    return;
  }
}

function showSiriFeedback(msg){
  document.getElementById('siriText').textContent=msg;
  document.getElementById('siriText').className='siri-text';
  setTimeout(stopSiri,1800);
}

// ── Speech Recognition ────────────────────────────────────────────────────────
function initRec(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast('הדפדפן לא תומך בזיהוי קול');return null}
  const r=new SR();r.lang='he-IL';r.continuous=false;r.interimResults=true;
  r.onresult=e=>{
    const txt=[...e.results].map(x=>x[0].transcript).join('');
    if(e.results[e.results.length-1].isFinal)showSiriFinal(txt);
    else showSiriInterim(txt);
  };
  r.onerror=e=>{
    stopRec();
    if(e.error==='not-allowed')toast('⛔ אנא אשר גישה למיקרופון');
    else if(e.error!=='no-speech')toast('שגיאה: '+e.error);
  };
  r.onend=stopRec;return r;
}

function startRec(){
  rec=rec||initRec();if(!rec)return;
  try{rec.start()}catch(e){return}
  siriLive=true;
  startVis();
}

function stopRec(){
  if(!siriLive)return;siriLive=false;
  try{rec.stop()}catch(e){}
  rec=null;stopVis();
}

// ── Audio Visualizer (drives siri wave bars) ──────────────────────────────────
async function startVis(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser();analyser.fftSize=64;
    audioCtx.createMediaStreamSource(stream).connect(analyser);
    driveWave();
  }catch(e){}
}

function driveWave(){
  const bars=document.querySelectorAll('.siri-bar');
  const buf=new Uint8Array(analyser.frequencyBinCount);
  function frame(){
    animId=requestAnimationFrame(frame);
    analyser.getByteFrequencyData(buf);
    bars.forEach((b,i)=>{
      const raw=buf[Math.floor(i*buf.length/bars.length)]/255;
      const h=Math.max(6,raw*raw*60+4);
      b.style.height=h+'px';
    });
  }
  frame();
}

function stopVis(){
  if(animId){cancelAnimationFrame(animId);animId=null}
  if(audioCtx){audioCtx.close();audioCtx=null}
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}
  document.querySelectorAll('.siri-bar').forEach(b=>{b.style.height='8px'});
}

document.addEventListener('visibilitychange',()=>{if(document.hidden&&siriLive)stopSiri()});

// ── PWA ───────────────────────────────────────────────────────────────────────
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('installBar').classList.add('on')});
window.addEventListener('appinstalled',()=>{document.getElementById('installBar').classList.remove('on');toast('🎉 האפליקציה הותקנה!')});
function installApp(){if(!deferredPrompt)return;deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('installBar').classList.remove('on')})}
function dismissInstall(){document.getElementById('installBar').classList.remove('on')}

// ── Parsing ───────────────────────────────────────────────────────────────────
function detectCat(text){
  for(const[name,{kw}]of Object.entries(CATS)){if(name==='כללי')continue;if(kw.some(k=>text.includes(k)))return name;}
  if(/לקנות|קנה|קניות/.test(text))return 'אישי';
  return 'כללי';
}
function detectIntent(text){
  if(/התקשר|תתקשר|לצלצל|צלצל/.test(text))return 'call';
  return 'task';
}
function detectTime(text){
  const now=new Date();
  let days=0;

  // ימים יחסיים
  if(text.includes('מחרתיים')||text.includes('עוד יומיים'))days=2;
  else if(text.includes('מחר'))days=1;

  // שבוע הבא
  if(!days&&(text.includes('שבוע הבא')||text.includes('שבוע הבאה')))days=7;

  // סוף שבוע → שישי
  if(!days&&(text.includes('סוף השבוע')||text.includes('סוף שבוע')||text.includes('סופשבוע'))){
    const d=now.getDay();let diff=5-d;if(diff<=0)diff+=7;days=diff;
  }

  // ימות השבוע — תומך בכל תחיליות: ב, ל, ה, ביום, ליום, ביום ה, ב-
  if(!days){
    const dowMap={ראשון:0,שני:1,שלישי:2,רביעי:3,חמישי:4,שישי:5,שבת:6};
    const dowM=text.match(/(?:(?:ב|ל|ה)-?(?:יום\s+(?:ה)?)?|יום\s+(?:ה)?)(ראשון|שני(?!ה)|שלישי|רביעי|חמישי|שישי|שבת)/)||
               text.match(/(?:^|\s)(ראשון|שני(?!ה)|שלישי|רביעי|חמישי|שישי|שבת)(?:\s|$)/);
    if(dowM){const dn=dowM[1];const today=now.getDay();let diff=dowMap[dn]-today;if(diff<=0)diff+=7;days=diff;}
  }

  // עוד X ימים
  if(!days){const xd=text.match(/עוד\s+(\d+)\s*ימים?/);if(xd)days=+xd[1];}

  const base=new Date(now);base.setDate(base.getDate()+days);

  // עוד X שעות
  const xh=text.match(/עוד\s+(\d+(?:\.\d+)?)\s*שעות?/);
  if(xh)return new Date(now.getTime()+parseFloat(xh[1])*3600000);
  if(text.includes('עוד שעתיים'))return new Date(now.getTime()+7200000);
  if(text.includes('עוד שעה וחצי'))return new Date(now.getTime()+5400000);
  if(text.includes('עוד שעה'))return new Date(now.getTime()+3600000);
  if(text.includes('עוד חצי שעה')||text.includes('עוד רבע שעה'.replace('רבע','חצי')))return new Date(now.getTime()+1800000);
  if(text.includes('עוד רבע שעה'))return new Date(now.getTime()+900000);

  const isMorning=text.includes('בוקר'),isNight=text.includes('לילה');
  const setH=(h,m=0)=>{base.setHours(h,m,0,0);if(days===0&&base<=now)base.setDate(base.getDate()+1);return new Date(base)};

  const wordHours={'שתים עשרה':12,'שתיים עשרה':12,'אחת עשרה':11,'אחד עשר':11,'עשר':isNight?22:10,'תשע':isMorning?9:21,'שמונה':isMorning?8:20,'שבע':isMorning?7:19,'שש':isMorning?6:18,'חמש':isMorning?5:17,'ארבע':isMorning?4:16,'שלוש':isMorning?3:15,'שתיים':isMorning?2:14,'שתים':isMorning?2:14,'אחת':isMorning?1:13,'אחד':isMorning?1:13};
  let firstIdx=Infinity,firstH=null,firstM=0;
  for(const[word,h] of Object.entries(wordHours)){
    const idx=text.indexOf(word);
    if(idx!==-1&&idx<firstIdx){firstIdx=idx;firstH=h;const after=text.slice(idx+word.length,idx+word.length+8);firstM=after.includes('וחצי')?30:after.includes('ורבע')?15:0;}
  }
  if(firstH!==null)return setH(firstH,firstM);

  const numRe=text.match(/(?:[בל]שעה?\s*|ב-?)(\d{1,2})(?::(\d{2}))?/)||text.match(/(\d{1,2}):(\d{2})/);
  if(numRe){let h=+numRe[1],m=+(numRe[2]||0);if(h>=1&&h<=9&&!isMorning)h+=12;if(!m){const after=text.slice((numRe.index||0)+numRe[0].length,(numRe.index||0)+numRe[0].length+8);m=after.includes('וחצי')?30:after.includes('ורבע')?15:0;}return setH(h,m);}

  if(isMorning)return setH(9);
  if(text.includes('צהריים')||text.includes('צהרים'))return setH(13);
  if(text.includes('אחר הצהריים')||text.includes('אחה"צ')||text.includes("אחה'צ")||text.includes('אחצ')||text.includes('אחה״צ'))return setH(15);
  if(text.includes('ערב')||text.includes('הערב'))return setH(20);
  if(isNight)return setH(22);
  if(days>0)return setH(9);
  return new Date(now.getTime()+3600000);
}
function to24hText(text){
  const m=text.includes('בוקר');
  text=text.replace(/\b(\d{1,2}):(\d{2})\b/g,(_,h,m2)=>{h=+h;if(h>=1&&h<=9&&!m)h+=12;return h.toString().padStart(2,'0')+':'+m2});
  text=text.replace(/(ב-?|בשעה?\s*)(\d{1,2})(?![:0-9])/g,(f,p,h)=>{h=+h;if(h>=1&&h<=9&&!m)h+=12;return p+h});
  return text;
}

// ── Tasks ─────────────────────────────────────────────────────────────────────
function addTask(text){
  if(!text.trim())return;
  const n=to24hText(text.trim());
  const task={id:Date.now(),text:n,category:detectCat(text),datetime:detectTime(text).toISOString(),createdAt:new Date().toISOString(),completed:false};
  tasks.unshift(task);save();render();toast('משימה נוספה');vibrate([10,30,10]);syncTask(task);
}
function sendEmailNotification(task){
  if(!gAuth?.email)return;
  fetch(N8N_WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...task,email:gAuth.email,action:'email_only'})}).catch(()=>{});
}
async function syncTask(task){
  const eventId=await createCalendarEvent(task);
  if(eventId){const t=tasks.find(x=>x.id===task.id);if(t){t.calendarEventId=eventId;save();render();}toast('נוסף לגוגל קאלנדר');}
  sendEmailNotification(task);
}
async function deleteFromCalendar(task){if(!task.calendarEventId)return;await deleteCalendarEvent(task.calendarEventId)}
function save(){localStorage.setItem('vt2',JSON.stringify(tasks));updateBadge()}
function toggleDone(id){const t=tasks.find(x=>x.id===id);if(t){t.completed=!t.completed;vibrate(8);save();render()}}
async function del(id){const t=tasks.find(x=>x.id===id);if(t)await deleteFromCalendar(t);tasks=tasks.filter(x=>x.id!==id);vibrate(15);save();render();toast('משימה נמחקה')}
function setCat(id,c){const t=tasks.find(x=>x.id===id);if(t){t.category=c;save();render()}}
function editTask(id){const el=document.getElementById('edit-'+id);if(el)el.classList.toggle('on')}
async function saveEdit(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  const txt=document.getElementById('etxt-'+id).value.trim();
  const dt=document.getElementById('edt-'+id).value;
  if(!txt)return;
  if(t.calendarEventId)await deleteFromCalendar(t);
  t.text=txt;t.category=detectCat(txt);
  if(dt)t.datetime=new Date(dt).toISOString();
  t.calendarEventId=null;save();render();await syncTask(t);toast('משימה עודכנה');
}
function cancelEdit(id){const el=document.getElementById('edit-'+id);if(el)el.classList.remove('on')}
function clearDone(){tasks=tasks.filter(x=>!x.completed);save();render();toast('הושלמו נוקו')}
function setFilter(f,btn){filter=f;document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');render()}
function updateBadge(){document.getElementById('badge').textContent=tasks.filter(t=>!t.completed).length+' פעילות'}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  const el=document.getElementById('list');if(!el)return;
  const list=filter==='all'?tasks.filter(t=>!t.completed):filter==='done'?tasks.filter(t=>t.completed):tasks.filter(t=>t.category===filter&&!t.completed);
  if(!list.length){el.innerHTML=`<div class="empty"><span class="empty-icon">🎯</span><p>אין משימות כאן.<br>לחץ על הכדור ודבר!</p></div>`;return}
  el.innerHTML=list.map(task=>{
    const cat=CATS[task.category]||CATS['כללי'];
    const dt=new Date(task.datetime);
    const dateStr=dt.toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'});
    const timeStr=dt.getHours().toString().padStart(2,'0')+':'+dt.getMinutes().toString().padStart(2,'0');
    const pad=n=>n.toString().padStart(2,'0');
    const dtLocal=`${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}T${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
    const opts=Object.keys(CATS).map(c=>`<option value="${c}"${c===task.category?' selected':''}>${c}</option>`).join('');
    const calBadge=task.calendarEventId?`<span class="cal-badge synced">${ICO.calSynced}מסונכרן</span>`:`<span class="cal-badge pending">${ICO.calPending}ממתין</span>`;
    const extraBtn=detectIntent(task.text)==='call'?`<button class="act call-btn" onclick="phoneAction(${task.id})">${ICO.phone}</button>`:'';
    return `<div class="card${task.completed?' done':''}" style="--cc:${cat.c}">
  <div class="task-txt">${esc(task.text)}</div>
  <div class="date-block">
    <div><div class="date-main">${timeStr}</div><div class="date-sub">${dateStr}</div></div>
    ${calBadge}
  </div>
  <div class="meta"><select class="cat-sel" onchange="setCat(${task.id},this.value)">${opts}</select></div>
  <div class="actions">
    <button class="act done-btn" onclick="toggleDone(${task.id})">${task.completed?ICO.undo:ICO.check}</button>
    <button class="act edit-btn" onclick="editTask(${task.id})">${ICO.edit}</button>
    ${extraBtn}
    <button class="act wa-btn" onclick="wa(${task.id})">${ICO.msg}</button>
    <button class="act cal-btn" onclick="cal(${task.id})">${ICO.cal}</button>
    <button class="act del-btn" onclick="del(${task.id})">${ICO.trash}</button>
  </div>
  <div class="card-edit" id="edit-${task.id}">
    <textarea class="edit-txt" id="etxt-${task.id}" rows="2">${esc(task.text)}</textarea>
    <input class="edit-dt" id="edt-${task.id}" type="datetime-local" value="${dtLocal}">
    <div class="edit-actions">
      <button class="edit-save" onclick="saveEdit(${task.id})">שמור שינויים</button>
      <button class="edit-cancel" onclick="cancelEdit(${task.id})">בטל</button>
    </div>
  </div>
</div>`;
  }).join('');
}

// ── Integrations ──────────────────────────────────────────────────────────────
function wa(id){const t=tasks.find(x=>x.id===id);if(!t)return;const dt=new Date(t.datetime);const ts=dt.getHours().toString().padStart(2,'0')+':'+dt.getMinutes().toString().padStart(2,'0');window.open('https://wa.me/?text='+encodeURIComponent(`📌 ${t.text}\n⏰ ${dt.toLocaleDateString('he-IL')} ${ts}`),'_blank')}
function cal(id){const t=tasks.find(x=>x.id===id);if(!t)return;const s=new Date(t.datetime),e=new Date(s.getTime()+3600000);const f=d=>d.toISOString().replace(/[-:]/g,'').slice(0,15)+'Z';window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(t.text)}&dates=${f(s)}/${f(e)}`,'_blank')}
function phoneAction(id){const t=tasks.find(x=>x.id===id);if(!t)return;const p=t.text.match(/\d[\d\-\s]{7,}/);if(p)window.open('tel:'+p[0].replace(/\D/g,''));else toast('הוסף מספר טלפון בעריכה')}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function vibrate(p){try{navigator.vibrate&&navigator.vibrate(p)}catch(e){}}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('on'),2400)}

window.addEventListener('load',initAuth);
</script>
