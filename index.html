<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>VoiceTask</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="VoiceTask">
<script src="https://accounts.google.com/gsi/client" async></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f0f5;--surface:#ffffff;
  --border:#e4e4e9;--border2:#d0d0d8;
  --text:#0a0a0a;--muted:#7a7a82;--muted2:#c0c0c8;
  --accent:#6366f1;--accent2:#818cf8;
  --r:20px;--r-sm:14px;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px);--sar:env(safe-area-inset-right,0px);
}
html{height:100%;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,'SF Pro Display','Segoe UI',Arial,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100svh;max-width:480px;margin:0 auto;
  padding:0 0 calc(120px + var(--sab));
  padding-left:var(--sal);padding-right:var(--sar);
  direction:rtl;overflow-x:hidden;
  overscroll-behavior-y:none;-webkit-user-select:none;user-select:none;
}

/* ── SVG Icon helper ── */
.ico{display:block;flex-shrink:0}

/* ── Login Screen ── */
#loginScreen{
  position:fixed;inset:0;z-index:200;
  background:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 32px;
}
#loginScreen.hidden{display:none}
.login-blob{
  width:160px;height:160px;flex-shrink:0;
  border-radius:60% 40% 30% 70% / 60% 30% 70% 40%;
  background:linear-gradient(135deg,#93c5fd 0%,#818cf8 35%,#c4b5fd 65%,#67e8f9 100%);
  background-size:300% 300%;
  animation:morph 9s ease-in-out infinite,grad-idle 7s ease infinite;
  display:flex;align-items:center;justify-content:center;
  font-size:64px;margin-bottom:32px;
  box-shadow:0 20px 60px rgba(99,102,241,.3);
}
.login-title{font-size:34px;font-weight:800;color:#0a0a0a;margin-bottom:10px;letter-spacing:-1px;text-align:center}
.login-sub{font-size:15px;color:#7a7a82;margin-bottom:48px;text-align:center;line-height:1.7;max-width:280px}
.google-btn{
  display:flex;align-items:center;gap:12px;
  padding:15px 32px;border-radius:50px;
  background:#fff;color:#0a0a0a;
  border:2px solid #e4e4e9;
  font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;
  box-shadow:0 4px 24px rgba(0,0,0,.08);
  transition:transform .12s,box-shadow .2s;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;
}
.google-btn:active{transform:scale(.96)}
.google-icon{width:22px;height:22px;flex-shrink:0}
.login-terms{margin-top:20px;font-size:12px;color:#c0c0c8;text-align:center;line-height:1.6;max-width:260px}

/* ── Header ── */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(16px + var(--sat)) 20px 14px;
  background:rgba(240,240,245,0.9);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  position:sticky;top:0;z-index:20;
  border-bottom:1px solid rgba(228,228,233,.6);
}
.logo-wrap{display:flex;align-items:center;gap:9px}
.logo-icon{
  width:32px;height:32px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(99,102,241,.3);
}
.logo{font-size:19px;font-weight:800;letter-spacing:-0.5px;color:var(--text)}
.header-right{display:flex;align-items:center;gap:9px}
.badge{
  font-size:12px;font-weight:700;color:var(--muted);
  background:var(--surface);border:1.5px solid var(--border);
  padding:5px 12px;border-radius:20px;letter-spacing:.2px;
}
.user-chip{
  display:flex;align-items:center;gap:7px;
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:50px;padding:4px 12px 4px 4px;
  cursor:pointer;touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;transition:background .15s;
}
.user-chip:active{background:var(--bg)}
.user-avatar{width:27px;height:27px;border-radius:50%;object-fit:cover}
.user-initials{
  width:27px;height:27px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),#67e8f9);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;color:#fff;flex-shrink:0;
}
.user-name-chip{font-size:12px;font-weight:600;color:var(--text);max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Mic section ── */
.mic-wrap{
  display:flex;flex-direction:column;align-items:center;
  padding:32px 20px 20px;gap:20px;
}

/* ── Blob ── */
.vis-wrap{
  position:relative;width:260px;height:260px;
  border-radius:60% 40% 30% 70% / 60% 30% 70% 40%;
  background:linear-gradient(135deg,#93c5fd 0%,#818cf8 35%,#c4b5fd 65%,#67e8f9 100%);
  background-size:300% 300%;
  animation:morph 9s ease-in-out infinite,grad-idle 7s ease infinite;
  cursor:pointer;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 24px 64px rgba(99,102,241,.32),0 8px 24px rgba(129,140,248,.18);
  transition:box-shadow .6s ease;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  will-change:border-radius;
}
.vis-wrap.rec{
  background:linear-gradient(135deg,#fca5a5 0%,#f87171 30%,#fb923c 65%,#fbbf24 100%);
  animation:morph-fast 1.6s ease-in-out infinite,grad-rec 2s ease infinite;
  box-shadow:0 24px 64px rgba(248,113,113,.38),0 8px 24px rgba(251,146,60,.24);
}
@keyframes morph{
  0%,100%{border-radius:60% 40% 30% 70% / 60% 30% 70% 40%}
  20%{border-radius:30% 60% 70% 40% / 50% 60% 30% 60%}
  40%{border-radius:50% 60% 30% 40% / 40% 50% 60% 50%}
  60%{border-radius:35% 55% 60% 45% / 55% 35% 65% 40%}
  80%{border-radius:40% 60% 50% 30% / 60% 40% 50% 40%}
}
@keyframes morph-fast{
  0%,100%{border-radius:40% 60% 60% 40% / 40% 60% 40% 60%}
  33%{border-radius:60% 40% 40% 60% / 60% 40% 60% 40%}
  66%{border-radius:50% 50% 30% 70% / 30% 70% 50% 50%}
}
@keyframes grad-idle{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes grad-rec{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

#lottieIdle,#lottieRec{display:none}
#vis{position:absolute;inset:0;opacity:0;transition:opacity .5s;pointer-events:none}
.vis-wrap.rec #vis{opacity:1}

.mic-btn{
  position:relative;z-index:5;pointer-events:none;
  width:76px;height:76px;border-radius:50%;border:none;
  background:rgba(255,255,255,.2);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s ease,background .4s;
  box-shadow:0 4px 20px rgba(0,0,0,.1);
}
.mic-btn.rec{background:rgba(255,255,255,.14);transform:scale(1.08)}
.vis-wrap:active .mic-btn{transform:scale(.88)}
.mic-btn svg{filter:drop-shadow(0 2px 4px rgba(0,0,0,.15))}

.mic-label{
  font-size:15px;color:var(--muted);font-weight:600;letter-spacing:-.1px;
  transition:color .3s;display:flex;align-items:center;gap:7px;
}
.mic-label.rec{color:#ef4444;font-weight:700}
.rec-dot{
  width:8px;height:8px;border-radius:50%;background:#ef4444;
  animation:pulse-dot 1s ease infinite;display:none;
}
.mic-label.rec .rec-dot{display:block}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

/* ── Transcript ── */
.transcript{
  width:calc(100% - 40px);max-width:400px;
  display:none;animation:fade-in .25s ease;
}
.transcript.on{display:flex;flex-direction:column;gap:10px}
.transcript-preview{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:14px 16px;
  font-size:15px;line-height:1.6;color:var(--muted);
}
.transcript-edit{
  background:var(--surface);border:2px solid var(--text);
  border-radius:var(--r);padding:14px 16px;
  font-size:15px;line-height:1.6;color:var(--text);
  resize:none;width:100%;font-family:inherit;direction:rtl;
  outline:none;min-height:80px;
  -webkit-user-select:text;user-select:text;
}
.transcript-edit:focus{border-color:var(--accent)}
.transcript-actions{display:flex;gap:8px}
.t-save{
  flex:1;padding:14px;border-radius:50px;
  background:var(--text);color:#fff;border:none;
  font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;
  transition:transform .12s,opacity .2s;
}
.t-save:active{transform:scale(.96);opacity:.85}
.t-cancel{
  padding:14px 20px;border-radius:50px;
  background:var(--surface);color:var(--muted);
  border:1.5px solid var(--border);
  font-size:15px;cursor:pointer;font-family:inherit;transition:transform .12s;
}
.t-cancel:active{transform:scale(.96)}
@keyframes fade-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ── Quick Actions ── */
.quick-wrap{
  display:flex;gap:8px;overflow-x:auto;
  padding:0 20px 4px;scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.quick-wrap::-webkit-scrollbar{display:none}
.quick-btn{
  flex-shrink:0;display:flex;align-items:center;gap:6px;
  padding:9px 16px;border-radius:50px;
  border:1.5px solid var(--border);background:var(--surface);
  color:var(--text);font-size:13px;font-weight:600;cursor:pointer;
  transition:all .16s;font-family:inherit;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  white-space:nowrap;
}
.quick-btn:active{transform:scale(.94);background:var(--bg)}
.quick-btn svg{opacity:.6}

/* ── Filters ── */
.filters{
  display:flex;gap:7px;overflow-x:auto;
  padding:14px 20px 16px;scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.filters::-webkit-scrollbar{display:none}
.f-btn{
  flex-shrink:0;padding:8px 16px;border-radius:50px;
  border:1.5px solid var(--border);background:var(--surface);
  color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;
  transition:all .18s;font-family:inherit;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;min-height:36px;
}
.f-btn.on{background:var(--text);border-color:var(--text);color:#fff;font-weight:700}

/* ── Section header ── */
.sec{display:flex;justify-content:space-between;align-items:center;padding:0 20px 10px}
.sec-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px}
.sec-btn{
  display:flex;align-items:center;gap:5px;
  font-size:12px;color:#ef4444;background:none;border:none;
  cursor:pointer;font-family:inherit;padding:4px 0;min-height:36px;
  touch-action:manipulation;font-weight:600;
}

/* ── Task List ── */
.list{display:flex;flex-direction:column;gap:10px;padding:0 20px}

/* ── Task Card ── */
.card{
  background:var(--surface);
  border:1px solid rgba(228,228,233,.8);
  border-radius:var(--r);
  border-right:3px solid var(--cc,var(--accent));
  padding:16px;position:relative;
  animation:slide .28s cubic-bezier(.25,.46,.45,.94);
  box-shadow:0 2px 16px rgba(0,0,0,.05);
  transition:opacity .25s,box-shadow .2s;
}
.card:hover{box-shadow:0 4px 24px rgba(0,0,0,.08)}
@keyframes slide{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.card.done{opacity:.4}
.card.done .task-txt{text-decoration:line-through;color:var(--muted)}

.task-txt{
  font-size:15px;line-height:1.55;font-weight:600;color:var(--text);
  margin-bottom:10px;-webkit-user-select:text;user-select:text;
}

/* Date block */
.date-block{
  background:var(--bg);border-radius:var(--r-sm);
  padding:8px 12px;margin-bottom:10px;
  display:flex;align-items:center;justify-content:space-between;
}
.date-time-wrap{display:flex;align-items:baseline;gap:6px}
.date-main{font-size:17px;font-weight:800;color:var(--text);letter-spacing:-.3px}
.date-sub{font-size:11px;color:var(--muted);margin-top:1px}

/* Cal badge */
.cal-badge{
  font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;
  display:inline-flex;align-items:center;gap:4px;
}
.cal-badge.synced{background:#dcfce7;color:#16a34a}
.cal-badge.pending{background:#fef9c3;color:#b45309}
.cal-badge svg{opacity:.8}

/* Meta row */
.meta{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.cat-sel{
  background:var(--bg);border:1px solid var(--border);
  color:var(--text);font-size:12px;font-weight:600;
  border-radius:20px;padding:5px 12px;font-family:inherit;cursor:pointer;
  outline:none;-webkit-appearance:none;appearance:none;min-height:30px;
}

/* Action buttons */
.actions{display:flex;gap:6px;justify-content:flex-end}
.act{
  width:36px;height:36px;border-radius:50%;
  border:1.5px solid var(--border);
  background:var(--bg);
  color:var(--muted);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:transform .1s,background .15s,color .15s,border-color .15s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.act:active{transform:scale(.8)}
.act.done-btn:active,.act.done-btn:hover{background:#dcfce7;border-color:#bbf7d0;color:#16a34a}
.act.edit-btn:active,.act.edit-btn:hover{background:#ede9fe;border-color:#ddd6fe;color:var(--accent)}
.act.wa-btn:active,.act.wa-btn:hover{background:#dcfce7;border-color:#bbf7d0;color:#16a34a}
.act.cal-btn:active,.act.cal-btn:hover{background:#dbeafe;border-color:#bfdbfe;color:#2563eb}
.act.del-btn{border-color:#fecaca;color:#f87171}
.act.del-btn:active,.act.del-btn:hover{background:#fee2e2;color:#ef4444}
.act.call-btn:active,.act.call-btn:hover{background:#dcfce7;border-color:#bbf7d0;color:#16a34a}

/* Inline edit */
.card-edit{
  display:none;margin-top:12px;padding-top:12px;
  border-top:1px solid var(--border);
  flex-direction:column;gap:8px;animation:fade-in .2s ease;
}
.card-edit.on{display:flex}
.edit-txt{
  background:var(--bg);border:1.5px solid var(--border2);
  border-radius:var(--r-sm);padding:10px 12px;
  font-size:14px;line-height:1.5;color:var(--text);
  resize:none;width:100%;font-family:inherit;direction:rtl;
  outline:none;min-height:60px;-webkit-user-select:text;user-select:text;
}
.edit-txt:focus{border-color:var(--accent)}
.edit-dt{
  background:var(--bg);border:1.5px solid var(--border2);
  border-radius:var(--r-sm);padding:9px 12px;
  font-size:13px;color:var(--text);font-family:inherit;outline:none;width:100%;
}
.edit-dt:focus{border-color:var(--accent)}
.edit-actions{display:flex;gap:7px}
.edit-save{
  flex:1;padding:10px;border-radius:50px;
  background:var(--text);color:#fff;border:none;
  font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;
}
.edit-cancel{
  padding:10px 16px;border-radius:50px;
  background:transparent;color:var(--muted);
  border:1.5px solid var(--border);font-size:13px;cursor:pointer;font-family:inherit;
}

/* ── Install bar ── */
.install-bar{
  position:fixed;bottom:calc(16px + var(--sab));left:16px;right:16px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 16px;display:none;align-items:center;gap:10px;
  box-shadow:0 8px 32px rgba(0,0,0,.1);z-index:50;max-width:448px;margin:0 auto;
}
.install-bar.on{display:flex}
.install-bar span{flex:1;font-size:13px;font-weight:600;color:var(--text)}
.install-bar button{padding:8px 16px;border-radius:50px;border:none;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;touch-action:manipulation}
.btn-install{background:var(--text);color:white}
.btn-dismiss{background:transparent;color:var(--muted);font-size:18px;padding:4px 8px}

/* ── Empty / Toast ── */
.empty{text-align:center;padding:52px 20px;color:var(--muted)}
.empty-icon{font-size:44px;display:block;margin-bottom:14px;opacity:.35}
.empty p{font-size:14px;line-height:1.7}
.divider{height:1px;background:var(--border);margin:4px 20px 12px;opacity:.6}
.toast{
  position:fixed;bottom:calc(28px + var(--sab));left:50%;
  transform:translateX(-50%) translateY(120px);
  background:var(--text);color:#fff;
  padding:12px 26px;border-radius:50px;font-size:14px;font-weight:600;
  box-shadow:0 8px 32px rgba(0,0,0,.2);z-index:99;
  transition:transform .32s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;
}
.toast.on{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- ── Login Screen ── -->
<div id="loginScreen">
  <div class="login-blob">🎤</div>
  <div class="login-title">VoiceTask</div>
  <div class="login-sub">הוצא את המחשבות מהראש<br>סנכרן לגוגל קאלנדר שלך</div>
  <button class="google-btn" onclick="signInWithGoogle()">
    <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    התחבר עם Google
  </button>
  <div class="login-terms">גישה לגוגל קאלנדר שלך בלבד</div>
</div>

<!-- ── Main App ── -->
<div id="app" style="display:none">

<div class="header">
  <div class="logo-wrap">
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </div>
    <span class="logo">VoiceTask</span>
  </div>
  <div class="header-right">
    <div class="badge" id="badge">0 פעילות</div>
    <div class="user-chip" id="userChip" onclick="confirmSignOut()"></div>
  </div>
</div>

<div class="mic-wrap">
  <div class="vis-wrap" id="visWrap" onclick="toggle()">
    <canvas id="vis" width="260" height="260"></canvas>
    <div class="mic-btn" id="micBtn">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </div>
    <div id="lottieIdle"></div><div id="lottieRec"></div>
  </div>
  <div class="mic-label" id="micLbl">
    <div class="rec-dot"></div>
    <span id="micLblTxt">לחץ לדיבור</span>

      try{

      }catch(e){toast('שגיאה בטעינת פרטי משתמש');}

async function getToken(){
  if(!gAuth)return null;
  if(gAuth.expiry>Date.now()+60000)return gAuth.access_token;
  return new Promise(resolve=>{
    if(!tokenClient){tokenClient=google.accounts.oauth2.initTokenClient({client_id:GOOGLE_CLIENT_ID,scope:SCOPES,callback:()=>{}})}
    const prev=tokenClient.callback;
    tokenClient.callback=(resp)=>{
      tokenClient.callback=prev;
      if(resp.error){resolve(null);return;}
      gAuth.access_token=resp.access_token;
      gAuth.expiry=Date.now()+(+(resp.expires_in||3600))*1000;
      localStorage.setItem('vt_auth',JSON.stringify(gAuth));
      resolve(resp.access_token);
    };
    tokenClient.requestAccessToken({prompt:''});
  });
}

// ── Audio Visualizer ──────────────────────────────────────────────────────────
const canvas=document.getElementById('vis'),vctx=canvas.getContext('2d');
const CX=130,CY=130;
let audioCtx=null,analyser=null,animId=null,stream=null;

async function startVis(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser();analyser.fftSize=128;
    audioCtx.createMediaStreamSource(stream).connect(analyser);drawVis();
  }catch(e){}
}
function drawVis(){
  const buf=new Uint8Array(analyser.frequencyBinCount),BARS=52,R=58;
  function frame(){
    animId=requestAnimationFrame(frame);
    analyser.getByteFrequencyData(buf);
    vctx.clearRect(0,0,260,260);
    for(let i=0;i<BARS;i++){
      const ang=(i/BARS)*Math.PI*2-Math.PI/2;
      const raw=buf[Math.floor(i*buf.length/BARS)]/255;
      const v=raw*raw,h=v*52+4;
      vctx.beginPath();
      vctx.moveTo(CX+Math.cos(ang)*R,CY+Math.sin(ang)*R);
      vctx.lineTo(CX+Math.cos(ang)*(R+h),CY+Math.sin(ang)*(R+h));
      vctx.strokeStyle=`rgba(255,255,255,${v*.7+.15})`;
      vctx.lineWidth=2.6;vctx.lineCap='round';vctx.stroke();
    }
  }
  frame();
}
function stopVis(){
  if(animId){cancelAnimationFrame(animId);animId=null}
  if(audioCtx){audioCtx.close();audioCtx=null}
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}
  vctx.clearRect(0,0,260,260);
}

// ── Parsing ───────────────────────────────────────────────────────────────────
function detectCat(text){
  for(const[name,{kw}]of Object.entries(CATS)){
    if(name==='כללי')continue;
    if(kw.some(k=>text.includes(k)))return name;
  }
  if(/לקנות|קנה|קניות/.test(text))return 'אישי';
  return 'כללי';
}

function detectIntent(text){
  if(/התקשר|תתקשר|לצלצל|צלצל/.test(text))return 'call';
  if(/שלח הודעה|שלח ל|דבר עם|ווטסאפ|וואטסאפ/.test(text))return 'whatsapp';
  return 'task';
}

function detectTime(text){
  const now=new Date();
  let days=0;
  if(text.includes('מחרתיים'))days=2;
  else if(text.includes('מחר'))days=1;
  const base=new Date(now);base.setDate(base.getDate()+days);
  if(text.includes('עוד שעתיים'))return new Date(now.getTime()+7200000);
  if(text.includes('עוד שעה'))return new Date(now.getTime()+3600000);
  const isMorning=text.includes('בוקר');
  const isNight=text.includes('לילה');
  const setH=(h,m=0)=>{
    base.setHours(h,m,0,0);
    if(days===0&&base<=now)base.setDate(base.getDate()+1);
    return new Date(base);
  };
  const wordHours={
    'שתים עשרה':12,'שתיים עשרה':12,'אחת עשרה':11,'אחד עשר':11,
    'עשר':isNight?22:10,'תשע':isMorning?9:21,'שמונה':isMorning?8:20,
    'שבע':isMorning?7:19,'שש':isMorning?6:18,'חמש':isMorning?5:17,
    'ארבע':isMorning?4:16,'שלוש':isMorning?3:15,
    'שתיים':isMorning?2:14,'שתים':isMorning?2:14,'אחת':isMorning?1:13,'אחד':isMorning?1:13
  };
  let firstIdx=Infinity,firstH=null,firstM=0;
  for(const[word,h] of Object.entries(wordHours)){
    const idx=text.indexOf(word);
    if(idx!==-1&&idx<firstIdx){
      firstIdx=idx;firstH=h;
      const after=text.slice(idx+word.length,idx+word.length+8);
      firstM=after.includes('וחצי')?30:after.includes('ורבע')?15:0;
    }
  }
  if(firstH!==null)return setH(firstH,firstM);
  const numRe=text.match(/(?:[בל]שעה?\s*|ב-?)(\d{1,2})(?::(\d{2}))?/)||text.match(/\b(\d{1,2}):(\d{2})\b/);
  if(numRe){
    let h=+numRe[1],m=+(numRe[2]||0);
    if(h>=1&&h<=9&&!isMorning)h+=12;
    if(!m){const after=text.slice((numRe.index||0)+numRe[0].length,+(numRe.index||0)+numRe[0].length+8);m=after.includes('וחצי')?30:after.includes('ורבע')?15:0;}
    return setH(h,m);
  }
  if(isMorning)return setH(9);
  if(text.includes('צהריים'))return setH(13);
  if(text.includes('אחר הצהריים'))return setH(15);
  if(text.includes('ערב')||text.includes('הערב'))return setH(20);
  if(isNight)return setH(22);
  if(days>0)return setH(9);
  return new Date(now.getTime()+3600000);
}

// ── Tasks ─────────────────────────────────────────────────────────────────────
function to24hText(text){
  const morning=text.includes('בוקר');
  text=text.replace(/\b(\d{1,2}):(\d{2})\b/g,(_,h,m)=>{h=+h;if(h>=1&&h<=9&&!morning)h+=12;return h.toString().padStart(2,'0')+':'+m;});
  text=text.replace(/(ב-?|בשעה?\s*)(\d{1,2})(?![:0-9])/g,(full,pre,h)=>{h=+h;if(h>=1&&h<=9&&!morning)h+=12;return pre+h;});
  return text;
}

function addTask(text){
  if(!text.trim())return;
  const normalized=to24hText(text.trim());
  const task={id:Date.now(),text:normalized,category:detectCat(text),datetime:detectTime(text).toISOString(),createdAt:new Date().toISOString(),completed:false};
  tasks.unshift(task);
  save();render();toast('משימה נוספה');vibrate([10,30,10]);
  hideTranscript();syncTask(task);
}

function sendEmailNotification(task){
  if(!gAuth?.email)return;
  fetch(N8N_WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...task,email:gAuth.email,action:'email_only'})}).catch(()=>{});
}

async function syncTask(task){
  const eventId=await createCalendarEvent(task);
  if(eventId){
    const t=tasks.find(x=>x.id===task.id);
    if(t){t.calendarEventId=eventId;save();render();}
    toast('נוסף לגוגל קאלנדר');
  }
  sendEmailNotification(task);
}

async function deleteFromCalendar(task){
  if(!task.calendarEventId)return;
  await deleteCalendarEvent(task.calendarEventId);
}

function save(){localStorage.setItem('vt2',JSON.stringify(tasks));updateBadge()}
function toggleDone(id){const t=tasks.find(x=>x.id===id);if(t){t.completed=!t.completed;vibrate(8);save();render()}}

async function del(id){
  const t=tasks.find(x=>x.id===id);
  if(t)await deleteFromCalendar(t);
  tasks=tasks.filter(x=>x.id!==id);vibrate(15);save();render();
  toast('משימה נמחקה');
}

function setCat(id,c){const t=tasks.find(x=>x.id===id);if(t){t.category=c;save();render()}}
function editTask(id){const el=document.getElementById('edit-'+id);if(el)el.classList.toggle('on')}

async function saveEdit(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  const txt=document.getElementById('etxt-'+id).value.trim();
  const dt=document.getElementById('edt-'+id).value;
  if(!txt)return;
  if(t.calendarEventId)await deleteFromCalendar(t);
  t.text=txt;t.category=detectCat(txt);
  if(dt)t.datetime=new Date(dt).toISOString();
  t.calendarEventId=null;
  save();render();await syncTask(t);toast('משימה עודכנה');
}

function cancelEdit(id){const el=document.getElementById('edit-'+id);if(el)el.classList.remove('on')}
function clearDone(){tasks=tasks.filter(x=>!x.completed);save();render();toast('הושלמו נוקו')}
function setFilter(f,btn){filter=f;document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');render()}
function updateBadge(){document.getElementById('badge').textContent=tasks.filter(t=>!t.completed).length+' פעילות'}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  const el=document.getElementById('list');if(!el)return;
  const list=filter==='all'?tasks.filter(t=>!t.completed):filter==='done'?tasks.filter(t=>t.completed):tasks.filter(t=>t.category===filter&&!t.completed);
  if(!list.length){
    el.innerHTML=`<div class="empty"><span class="empty-icon">🎯</span><p>אין משימות כאן.<br>לחץ על הבועה ודבר!</p></div>`;
    return;
  }
  el.innerHTML=list.map(task=>{
    const cat=CATS[task.category]||CATS['כללי'];
    const dt=new Date(task.datetime);
    const dateStr=dt.toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'});
    const timeStr=dt.getHours().toString().padStart(2,'0')+':'+dt.getMinutes().toString().padStart(2,'0');
    const pad=n=>n.toString().padStart(2,'0');
    const dtLocal=`${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}T${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
    const opts=Object.keys(CATS).map(c=>`<option value="${c}"${c===task.category?' selected':''}>${c}</option>`).join('');
    const calBadge=task.calendarEventId
      ?`<span class="cal-badge synced">${ICO.calSynced}מסונכרן</span>`
      :`<span class="cal-badge pending">${ICO.calPending}ממתין</span>`;
    const intent=detectIntent(task.text);
    const extraBtn=intent==='call'
      ?`<button class="act call-btn" onclick="phoneAction(${task.id})" title="התקשר">${ICO.phone}</button>`
      :'';
    const doneIco=task.completed?ICO.undo:ICO.check;
    return `<div class="card${task.completed?' done':''}" style="--cc:${cat.c}">
  <div class="task-txt">${esc(task.text)}</div>
  <div class="date-block">
    <div>
      <div class="date-time-wrap"><div class="date-main">${timeStr}</div></div>
      <div class="date-sub">${dateStr}</div>
    </div>
    ${calBadge}
  </div>
  <div class="meta">
    <select class="cat-sel" onchange="setCat(${task.id},this.value)">${opts}</select>
  </div>
  <div class="actions">
    <button class="act done-btn" onclick="toggleDone(${task.id})" title="${task.completed?'שחזר':'סיים'}">${doneIco}</button>
    <button class="act edit-btn" onclick="editTask(${task.id})" title="ערוך">${ICO.edit}</button>
    ${extraBtn}
    <button class="act wa-btn" onclick="wa(${task.id})" title="WhatsApp">${ICO.msg}</button>
    <button class="act cal-btn" onclick="cal(${task.id})" title="פתח בקאלנדר">${ICO.cal}</button>
    <button class="act del-btn" onclick="del(${task.id})" title="מחק">${ICO.trash}</button>
  </div>
  <div class="card-edit" id="edit-${task.id}">
    <textarea class="edit-txt" id="etxt-${task.id}" rows="2">${esc(task.text)}</textarea>
    <input class="edit-dt" id="edt-${task.id}" type="datetime-local" value="${dtLocal}">
    <div class="edit-actions">
      <button class="edit-save" onclick="saveEdit(${task.id})">שמור שינויים</button>
      <button class="edit-cancel" onclick="cancelEdit(${task.id})">בטל</button>
    </div>
  </div>
</div>`;
  }).join('');
}

// ── Integrations ──────────────────────────────────────────────────────────────
function wa(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  const dt=new Date(t.datetime);
  const timeStr=dt.getHours().toString().padStart(2,'0')+':'+dt.getMinutes().toString().padStart(2,'0');
  window.open('https://wa.me/?text='+encodeURIComponent(`📌 ${t.text}\n⏰ ${dt.toLocaleDateString('he-IL')} ${timeStr}`),'_blank');
}
function cal(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  const s=new Date(t.datetime),e=new Date(s.getTime()+3600000);
  const f=d=>d.toISOString().replace(/[-:]/g,'').slice(0,15)+'Z';
  window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(t.text)}&dates=${f(s)}/${f(e)}`,'_blank');
}
function phoneAction(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  const phone=t.text.match(/\d[\d\-\s]{7,}/);
  if(phone)window.open('tel:'+phone[0].replace(/\D/g,''));
  else toast('לחץ לחיוג — הכנס מספר בעריכה');
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function vibrate(p){try{navigator.vibrate&&navigator.vibrate(p)}catch(e){}}
function toast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('on'),2400);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
window.addEventListener('load',initAuth);
</script>
</body>
</html>
