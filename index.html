<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>VoiceTask</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="VoiceTask">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2f2f7;--surface:#ffffff;
  --border:#e5e5ea;--border2:#d1d1d6;
  --text:#1a1a1a;--muted:#8a8a8e;--muted2:#c7c7cc;
  --r:18px;--r-sm:12px;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px);--sar:env(safe-area-inset-right,0px);
}
html{height:100%;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,'SF Pro Display','Segoe UI',Arial,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100svh;max-width:480px;margin:0 auto;
  padding:0 0 calc(110px + var(--sab));
  padding-left:var(--sal);padding-right:var(--sar);
  direction:rtl;overflow-x:hidden;
  overscroll-behavior-y:none;-webkit-user-select:none;user-select:none;
}

/* ── Header ── */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(18px + var(--sat)) 24px 16px;
  background:rgba(242,242,247,0.88);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  position:sticky;top:0;z-index:20;
}
.logo{font-size:21px;font-weight:800;letter-spacing:-0.6px;color:var(--text)}
.badge{
  font-size:12px;font-weight:600;color:var(--muted);
  background:var(--surface);border:1.5px solid var(--border);
  padding:5px 13px;border-radius:20px;
}

/* ── Mic section ── */
.mic-wrap{
  display:flex;flex-direction:column;align-items:center;
  padding:36px 20px 24px;gap:22px;
}

/* ── Blob ── */
.vis-wrap{
  position:relative;width:280px;height:280px;
  border-radius:60% 40% 30% 70% / 60% 30% 70% 40%;
  background:linear-gradient(135deg,#93c5fd 0%,#818cf8 35%,#c4b5fd 65%,#67e8f9 100%);
  background-size:300% 300%;
  animation:morph 9s ease-in-out infinite,grad-idle 7s ease infinite;
  cursor:pointer;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 28px 72px rgba(96,165,250,.38),0 8px 28px rgba(129,140,248,.22);
  transition:box-shadow .6s ease;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  will-change:border-radius;
}
.vis-wrap.rec{
  background:linear-gradient(135deg,#fca5a5 0%,#f87171 30%,#fb923c 65%,#fbbf24 100%);
  animation:morph-fast 1.6s ease-in-out infinite,grad-rec 2s ease infinite;
  box-shadow:0 28px 72px rgba(248,113,113,.42),0 8px 28px rgba(251,146,60,.28);
}
@keyframes morph{
  0%,100%{border-radius:60% 40% 30% 70% / 60% 30% 70% 40%}
  20%  {border-radius:30% 60% 70% 40% / 50% 60% 30% 60%}
  40%  {border-radius:50% 60% 30% 40% / 40% 50% 60% 50%}
  60%  {border-radius:35% 55% 60% 45% / 55% 35% 65% 40%}
  80%  {border-radius:40% 60% 50% 30% / 60% 40% 50% 40%}
}
@keyframes morph-fast{
  0%,100%{border-radius:40% 60% 60% 40% / 40% 60% 40% 60%}
  33%   {border-radius:60% 40% 40% 60% / 60% 40% 60% 40%}
  66%   {border-radius:50% 50% 30% 70% / 30% 70% 50% 50%}
}
@keyframes grad-idle{
  0%  {background-position:0% 50%}
  50% {background-position:100% 50%}
  100%{background-position:0% 50%}
}
@keyframes grad-rec{
  0%  {background-position:0% 50%}
  50% {background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* Lottie — hidden, not used */
#lottieIdle,#lottieRec{display:none}

/* Canvas overlay on blob */
#vis{
  position:absolute;inset:0;
  opacity:0;transition:opacity .5s;pointer-events:none;
}
.vis-wrap.rec #vis{opacity:1}

/* Center icon inside blob */
.mic-btn{
  position:relative;z-index:5;pointer-events:none;
  width:80px;height:80px;border-radius:50%;border:none;
  background:rgba(255,255,255,.22);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;
  font-size:34px;
  transition:transform .15s ease,background .4s;
  box-shadow:0 4px 20px rgba(0,0,0,.08);
}
.mic-btn.rec{background:rgba(255,255,255,.14);transform:scale(1.08)}
.vis-wrap:active .mic-btn{transform:scale(.9)}

/* Status label */
.mic-label{
  font-size:16px;color:var(--muted);font-weight:500;letter-spacing:-.2px;
  transition:color .3s;
}
.mic-label.rec{color:#ef4444;font-weight:700}

/* ── Transcript edit ── */
.transcript{
  width:calc(100% - 40px);max-width:400px;
  display:none;animation:fade-in .25s ease;
}
.transcript.on{display:flex;flex-direction:column;gap:10px}
.transcript-preview{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:14px 16px;
  font-size:15px;line-height:1.6;color:var(--muted);
}
.transcript-edit{
  background:var(--surface);border:2px solid var(--text);
  border-radius:var(--r);padding:14px 16px;
  font-size:15px;line-height:1.6;color:var(--text);
  resize:none;width:100%;font-family:inherit;direction:rtl;
  outline:none;min-height:80px;
  -webkit-user-select:text;user-select:text;
}
.transcript-edit:focus{border-color:#818cf8}
.transcript-actions{display:flex;gap:8px}
.t-save{
  flex:1;padding:14px;border-radius:50px;
  background:var(--text);color:#fff;border:none;
  font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;
  transition:transform .12s,opacity .2s;
}
.t-save:active{transform:scale(.96);opacity:.85}
.t-cancel{
  padding:14px 20px;border-radius:50px;
  background:var(--surface);color:var(--muted);
  border:1.5px solid var(--border);
  font-size:15px;cursor:pointer;font-family:inherit;
  transition:transform .12s;
}
.t-cancel:active{transform:scale(.96)}
@keyframes fade-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ── Filters ── */
.filters{
  display:flex;gap:8px;overflow-x:auto;
  padding:4px 20px 16px;scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.filters::-webkit-scrollbar{display:none}
.f-btn{
  flex-shrink:0;padding:9px 18px;border-radius:50px;
  border:1.5px solid var(--border);background:var(--surface);
  color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;
  transition:all .18s;font-family:inherit;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;min-height:38px;
}
.f-btn.on{background:var(--text);border-color:var(--text);color:#fff;font-weight:600}

/* ── Section header ── */
.sec{display:flex;justify-content:space-between;align-items:center;padding:0 20px 10px}
.sec-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.sec-btn{font-size:13px;color:#ef4444;background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 0;min-height:36px;touch-action:manipulation;font-weight:500}

/* ── Task List ── */
.list{display:flex;flex-direction:column;gap:10px;padding:0 20px}

/* ── Task Card ── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  border-right:4px solid var(--cc,#818cf8);
  padding:16px;position:relative;
  animation:slide .28s cubic-bezier(.25,.46,.45,.94);transition:opacity .25s;
}
@keyframes slide{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
.card.done{opacity:.45}
.card.done .task-txt{text-decoration:line-through;color:var(--muted)}
.task-txt{
  font-size:15px;line-height:1.55;font-weight:600;color:var(--text);
  margin-bottom:10px;-webkit-user-select:text;user-select:text;
}
.meta{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.time-chip{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:3px;font-weight:500}
.cal-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:3px}
.cal-badge.synced{background:#dcfce7;color:#16a34a}
.cal-badge.pending{background:#fef9c3;color:#b45309}
.date-block{background:var(--bg);border-radius:var(--r-sm);padding:8px 12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.date-main{font-size:15px;font-weight:700;color:var(--text)}
.date-sub{font-size:11px;color:var(--muted);margin-top:1px}
.cat-sel{
  background:var(--bg);border:1px solid var(--border);
  color:var(--text);font-size:12px;font-weight:600;
  border-radius:20px;padding:5px 12px;font-family:inherit;cursor:pointer;
  outline:none;-webkit-appearance:none;appearance:none;min-height:30px;
}
.actions{display:flex;gap:7px;justify-content:flex-end}
.act{
  width:38px;height:38px;border-radius:50%;
  border:1.5px solid var(--border);background:var(--bg);
  font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform .1s,background .15s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.act:active{transform:scale(.82);background:var(--border)}
.act.danger{border-color:#fecaca;color:#ef4444}
.act.danger:active{background:#fee2e2}

/* ── Inline edit form ── */
.card-edit{
  display:none;margin-top:12px;padding-top:12px;
  border-top:1px solid var(--border);
  flex-direction:column;gap:8px;
  animation:fade-in .2s ease;
}
.card-edit.on{display:flex}
.edit-txt{
  background:var(--bg);border:1.5px solid var(--border2);
  border-radius:var(--r-sm);padding:10px 12px;
  font-size:14px;line-height:1.5;color:var(--text);
  resize:none;width:100%;font-family:inherit;direction:rtl;
  outline:none;min-height:60px;
  -webkit-user-select:text;user-select:text;
}
.edit-txt:focus{border-color:#818cf8}
.edit-dt{
  background:var(--bg);border:1.5px solid var(--border2);
  border-radius:var(--r-sm);padding:9px 12px;
  font-size:13px;color:var(--text);font-family:inherit;
  outline:none;width:100%;
}
.edit-dt:focus{border-color:#818cf8}
.edit-actions{display:flex;gap:7px}
.edit-save{
  flex:1;padding:10px;border-radius:50px;
  background:var(--text);color:#fff;border:none;
  font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;
}
.edit-cancel{
  padding:10px 16px;border-radius:50px;
  background:transparent;color:var(--muted);
  border:1.5px solid var(--border);
  font-size:13px;cursor:pointer;font-family:inherit;
}

/* ── Install bar ── */
.install-bar{
  position:fixed;bottom:calc(16px + var(--sab));left:16px;right:16px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 16px;display:none;align-items:center;gap:10px;
  box-shadow:0 8px 32px rgba(0,0,0,.1);z-index:50;max-width:448px;margin:0 auto;
}
.install-bar.on{display:flex}
.install-bar span{flex:1;font-size:13px;font-weight:600;color:var(--text)}
.install-bar button{padding:8px 16px;border-radius:50px;border:none;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;touch-action:manipulation}
.btn-install{background:var(--text);color:white}
.btn-dismiss{background:transparent;color:var(--muted);font-size:18px;padding:4px 8px}

/* ── Empty / Toast ── */
.empty{text-align:center;padding:52px 20px;color:var(--muted)}
.empty i{font-size:48px;display:block;margin-bottom:14px;opacity:.4}
.empty p{font-size:14px;line-height:1.7}
.toast{
  position:fixed;bottom:calc(28px + var(--sab));left:50%;
  transform:translateX(-50%) translateY(120px);
  background:var(--text);color:#fff;
  padding:12px 26px;border-radius:50px;font-size:14px;font-weight:600;
  box-shadow:0 8px 32px rgba(0,0,0,.18);z-index:99;
  transition:transform .32s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;
}
.toast.on{transform:translateX(-50%) translateY(0)}
.divider{height:1px;background:var(--border);margin:4px 20px 14px}
</style>
</head>
<body>

<div class="header">
  <div class="logo">VoiceTask</div>
  <div class="badge" id="badge">0 פעילות</div>
</div>

<div class="mic-wrap">
  <div class="vis-wrap" id="visWrap" onclick="toggle()">
    <canvas id="vis" width="280" height="280"></canvas>
    <div class="mic-btn" id="micBtn">🎤</div>
    <div id="lottieIdle"></div>
    <div id="lottieRec"></div>
  </div>
  <div class="mic-label" id="micLbl">לחץ לדיבור</div>
  <div class="transcript" id="transcript">
    <div class="transcript-preview" id="transcriptPreview"></div>
    <textarea class="transcript-edit" id="transcriptEdit" rows="3" placeholder="ערוך את הטקסט..."></textarea>
    <div class="transcript-actions">
      <button class="t-save" onclick="confirmTask()">שמור משימה</button>
      <button class="t-cancel" onclick="cancelTask()">בטל</button>
    </div>
  </div>
</div>

<div class="filters">
  <button class="f-btn on" onclick="setFilter('all',this)">הכל</button>
  <button class="f-btn" onclick="setFilter('אישי',this)">👤 אישי</button>
  <button class="f-btn" onclick="setFilter('מקצועי',this)">💼 מקצועי</button>
  <button class="f-btn" onclick="setFilter('כללי',this)">📌 כללי</button>
  <button class="f-btn" onclick="setFilter('done',this)">✅ הושלמו</button>
</div>

<div class="divider"></div>
<div class="sec">
  <span class="sec-title">משימות</span>
  <button class="sec-btn" onclick="clearDone()">נקה הושלמו</button>
</div>
<div class="list" id="list"></div>

<div class="install-bar" id="installBar">
  <span>📲 הוסף למסך הבית</span>
  <button class="btn-dismiss" onclick="dismissInstall()">✕</button>
  <button class="btn-install" onclick="installApp()">התקן</button>
</div>
<div class="toast" id="toast"></div>

<script>
// ── App State ─────────────────────────────────────────────────────────────────
const CATS = {
  אישי:   {kw:['לקנות','קניות','בית','סידורים','משפחה','ילדים','אוכל','רופא','כביסה','ניקיון'],c:'#34d399'},
  מקצועי: {kw:['לקוח','פגישה','עבודה','מייל','פרויקט','דוח','משרד','שיחה','זום','ישיבה'],c:'#818cf8'},
  כללי:   {kw:[],c:'#fbbf24'}
};

let tasks = JSON.parse(localStorage.getItem('vt2')||'[]');
let rec=null,live=false,filter='all',deferredPrompt=null;

// ── Audio Visualizer ──────────────────────────────────────────────────────────
const canvas=document.getElementById('vis'),vctx=canvas.getContext('2d');
const CX=140,CY=140;
let audioCtx=null,analyser=null,animId=null,stream=null;

async function startVis(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=128;
    audioCtx.createMediaStreamSource(stream).connect(analyser);
    drawVis();
  }catch(e){}
}

function drawVis(){
  const buf=new Uint8Array(analyser.frequencyBinCount),BARS=56,R=62;
  function frame(){
    animId=requestAnimationFrame(frame);
    analyser.getByteFrequencyData(buf);
    vctx.clearRect(0,0,280,280);
    for(let i=0;i<BARS;i++){
      const ang=(i/BARS)*Math.PI*2-Math.PI/2;
      const raw=buf[Math.floor(i*buf.length/BARS)]/255;
      const v=raw*raw, h=v*55+4;
      const c=Math.cos(ang),s=Math.sin(ang);
      vctx.beginPath();
      vctx.moveTo(CX+c*R,CY+s*R);
      vctx.lineTo(CX+c*(R+h),CY+s*(R+h));
      vctx.strokeStyle=`rgba(255,255,255,${v*.65+.18})`;
      vctx.lineWidth=2.8;vctx.lineCap='round';vctx.stroke();
    }
  }
  frame();
}

function stopVis(){
  if(animId){cancelAnimationFrame(animId);animId=null}
  if(audioCtx){audioCtx.close();audioCtx=null}
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}
  vctx.clearRect(0,0,280,280);
}

// ── PWA ───────────────────────────────────────────────────────────────────────
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  document.getElementById('installBar').classList.add('on');
});
window.addEventListener('appinstalled',()=>{
  document.getElementById('installBar').classList.remove('on');
  toast('🎉 האפליקציה הותקנה!');
});
function installApp(){if(!deferredPrompt)return;deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('installBar').classList.remove('on')})}
function dismissInstall(){document.getElementById('installBar').classList.remove('on')}

// ── Voice ─────────────────────────────────────────────────────────────────────
function initRec(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast('הדפדפן לא תומך בזיהוי קול 😕');return null}
  const r=new SR();r.lang='he-IL';r.continuous=false;r.interimResults=true;
  r.onresult=e=>{
    const txt=[...e.results].map(x=>x[0].transcript).join('');
    if(e.results[e.results.length-1].isFinal){showEditTranscript(txt);}
    else{showTranscript(txt);}
  };
  r.onerror=e=>{
    stop();
    if(e.error==='not-allowed')toast('⛔ אנא אשר גישה למיקרופון');
    else if(e.error==='audio-capture')toast('🎤 מיקרופון לא זמין');
    else if(e.error!=='no-speech')toast('שגיאה: '+e.error);
  };
  r.onend=stop;
  return r;
}

function toggle(){vibrate(10);live?stop():start()}

async function start(){
  rec=rec||initRec();if(!rec)return;
  try{rec.start()}catch(e){return}
  live=true;setUI(true);
  setTimeout(()=>{if(live)startVis()},300);
}

function stop(){
  if(!live)return;live=false;
  try{rec.stop()}catch(e){}
  rec=null;
  stopVis();
  setUI(false);
}

function setUI(on){
  document.getElementById('micBtn').className='mic-btn'+(on?' rec':'');
  document.getElementById('micBtn').textContent=on?'⏹':'🎤';
  document.getElementById('visWrap').className='vis-wrap'+(on?' rec':'');
  document.getElementById('micLbl').className='mic-label'+(on?' rec':'');
  document.getElementById('micLbl').textContent=on?'⬤  מאזין...':'לחץ לדיבור';
}

function showTranscript(t){
  document.getElementById('transcriptPreview').textContent=t;
  document.getElementById('transcript').classList.add('on');
}
function showEditTranscript(t){
  document.getElementById('transcriptPreview').textContent='';
  document.getElementById('transcriptEdit').value=t;
  document.getElementById('transcript').classList.add('on');
  setTimeout(()=>document.getElementById('transcriptEdit').focus(),50);
}
function hideTranscript(){
  document.getElementById('transcript').classList.remove('on');
  document.getElementById('transcriptPreview').textContent='';
  document.getElementById('transcriptEdit').value='';
}
function confirmTask(){
  const txt=document.getElementById('transcriptEdit').value.trim();
  if(txt)addTask(txt);
  else hideTranscript();
}
function cancelTask(){hideTranscript();}
document.addEventListener('visibilitychange',()=>{if(document.hidden&&live)stop()});

// ── Parsing ───────────────────────────────────────────────────────────────────
function detectCat(text){
  for(const[name,{kw}]of Object.entries(CATS)){
    if(name==='כללי')continue;
    if(kw.some(k=>text.includes(k)))return name;
  }
  return 'כללי';
}

function detectTime(text){
  const now=new Date();

  // שלב 1: קביעת תאריך בסיס
  let days=0;
  if(text.includes('מחרתיים'))days=2;
  else if(text.includes('מחר'))days=1;
  const base=new Date(now);
  base.setDate(base.getDate()+days);

  // שלב 2: זמנים יחסיים (ללא תאריך)
  if(text.includes('עוד שעתיים'))return new Date(now.getTime()+7200000);
  if(text.includes('עוד שעה'))return new Date(now.getTime()+3600000);

  const setH=(h,m=0)=>{
    base.setHours(h,m,0,0);
    // אם אין יום מפורש והשעה עברה — קדם ליום הבא
    if(days===0&&base<=now)base.setDate(base.getDate()+1);
    return new Date(base);
  };

  // שלב 3: זיהוי שעה — מילות מפתח עבריות (מהארוך לקצר)
  const isMorning=text.includes('בוקר');
  const isNight  =text.includes('לילה');
  const wordMap=[
    ['שתים עשרה',12],['שתיים עשרה',12],
    ['אחת עשרה',11],['אחד עשר',11],
    ['עשר',isNight?22:10],
    ['תשע',isNight?21:21],
    ['שמונה',isNight?20:20],
    ['שבע',19],['שש',18],['חמש',17],
    ['ארבע',16],['שלוש',15],
    ['שתיים',14],['שתים',14],
    ['אחת',13],['אחד',13]
  ];
  for(const[word,h] of wordMap){
    if(text.includes(word)){
      const hour=isMorning&&h>12?h-12:h;
      return setH(hour,0);
    }
  }

  // שלב 4: שעה מספרית (16:00 / ב16 / לשעה 16)
  const explicit=text.match(/(?:[בל]שעה?\s*|ב-)(\d{1,2})(?::(\d{2}))?/)||
                 text.match(/\b(\d{1,2}):(\d{2})\b/);
  if(explicit)return setH(+explicit[1],+(explicit[2]||0));

  // שלב 5: מילות מפתח כלליות
  if(isMorning)                                                return setH(9);
  if(text.includes('צהריים'))                                  return setH(13);
  if(text.includes('אחר הצהריים'))                             return setH(15);
  if(text.includes('ערב')||text.includes('הערב'))              return setH(20);
  if(isNight)                                                   return setH(22);

  // ברירת מחדל: אם ציין מחר/מחרתיים בלי שעה — 09:00; אחרת שעה מעכשיו
  if(days>0)return setH(9);
  return new Date(now.getTime()+3600000);
}

// ── Tasks ─────────────────────────────────────────────────────────────────────
const N8N_WEBHOOK = 'https://guyfs.app.n8n.cloud/webhook/voicetask';
const USER_EMAIL  = localStorage.getItem('vt_email') || 'fayna007@gmail.com';

function addTask(text){
  if(!text.trim())return;
  const task={
    id:Date.now(),text:text.trim(),
    category:detectCat(text),
    datetime:detectTime(text).toISOString(),
    createdAt:new Date().toISOString(),
    completed:false
  };
  tasks.unshift(task);
  save();render();toast('✅ משימה נוספה');vibrate([10,30,10]);
  hideTranscript();
  sendToN8n(task);
}

function sendToN8n(task){
  fetch(N8N_WEBHOOK,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({...task,email:USER_EMAIL,action:'create'})
  })
  .then(r=>r.json().catch(()=>null).then(data=>{
    if(data&&data.eventId){
      const t=tasks.find(x=>x.id===task.id);
      if(t){t.calendarEventId=data.eventId;save();}
    }
    toast('🤖 n8n קיבל את המשימה');
  }))
  .catch(()=>{});
}

function deleteFromCalendar(task){
  if(!task.calendarEventId)return;
  fetch(N8N_WEBHOOK,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action:'delete',calendarEventId:task.calendarEventId,email:USER_EMAIL})
  }).catch(()=>{});
}

function save(){localStorage.setItem('vt2',JSON.stringify(tasks));updateBadge()}
function toggleDone(id){const t=tasks.find(x=>x.id===id);if(t){t.completed=!t.completed;vibrate(8);save();render()}}
function del(id){
  const t=tasks.find(x=>x.id===id);
  if(t)deleteFromCalendar(t);
  tasks=tasks.filter(x=>x.id!==id);vibrate(15);save();render();
  toast('🗑 משימה נמחקה');
}
function setCat(id,c){const t=tasks.find(x=>x.id===id);if(t){t.category=c;save();render()}}

function editTask(id){
  const el=document.getElementById('edit-'+id);
  if(el)el.classList.toggle('on');
}
function saveEdit(id){
  const t=tasks.find(x=>x.id===id);
  if(!t)return;
  const txt=document.getElementById('etxt-'+id).value.trim();
  const dt=document.getElementById('edt-'+id).value;
  if(!txt)return;
  // מחק אירוע קיים בקאלנדר
  if(t.calendarEventId)deleteFromCalendar(t);
  t.text=txt;
  t.category=detectCat(txt);
  if(dt)t.datetime=new Date(dt).toISOString();
  t.calendarEventId=null;
  save();render();
  // צור אירוע חדש
  sendToN8n(t);
  toast('✏️ משימה עודכנה');
}
function cancelEdit(id){
  const el=document.getElementById('edit-'+id);
  if(el)el.classList.remove('on');
}
function clearDone(){tasks=tasks.filter(x=>!x.completed);save();render();toast('🗑 הושלמו נוקו')}
function setFilter(f,btn){filter=f;document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');render()}
function updateBadge(){document.getElementById('badge').textContent=tasks.filter(t=>!t.completed).length+' פעילות'}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  const el=document.getElementById('list');
  const list=filter==='all'?tasks.filter(t=>!t.completed):filter==='done'?tasks.filter(t=>t.completed):tasks.filter(t=>t.category===filter&&!t.completed);
  if(!list.length){el.innerHTML=`<div class="empty"><i>🎯</i><p>אין משימות כאן.<br>לחץ על הבועה ודבר!</p></div>`;return}
  el.innerHTML=list.map(task=>{
    const cat=CATS[task.category]||CATS['כללי'];
    const dt=new Date(task.datetime);
    const dateStr=dt.toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'});
    const timeStr=dt.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit',hour12:false});
    const opts=Object.keys(CATS).map(c=>`<option value="${c}"${c===task.category?' selected':''}>${c}</option>`).join('');
    const dtLocal=dt.toISOString().slice(0,16);
    const calBadge=task.calendarEventId
      ?`<span class="cal-badge synced">📅 מסונכרן</span>`
      :`<span class="cal-badge pending">📅 ממתין</span>`;
    return `<div class="card${task.completed?' done':''}" style="--cc:${cat.c}">
  <div class="task-txt">${esc(task.text)}</div>
  <div class="date-block">
    <div>
      <div class="date-main">🕐 ${timeStr}</div>
      <div class="date-sub">${dateStr}</div>
    </div>
    ${calBadge}
  </div>
  <div class="meta">
    <select class="cat-sel" onchange="setCat(${task.id},this.value)">${opts}</select>
  </div>
  <div class="actions">
    <button class="act" onclick="toggleDone(${task.id})">${task.completed?'↩':'✅'}</button>
    <button class="act" onclick="editTask(${task.id})">✏️</button>
    <button class="act" onclick="wa(${task.id})">💬</button>
    <button class="act" onclick="cal(${task.id})">📅</button>
    <button class="act danger" onclick="del(${task.id})">🗑</button>
  </div>
  <div class="card-edit" id="edit-${task.id}">
    <textarea class="edit-txt" id="etxt-${task.id}" rows="2">${esc(task.text)}</textarea>
    <input class="edit-dt" id="edt-${task.id}" type="datetime-local" value="${dtLocal}">
    <div class="edit-actions">
      <button class="edit-save" onclick="saveEdit(${task.id})">שמור שינויים</button>
      <button class="edit-cancel" onclick="cancelEdit(${task.id})">בטל</button>
    </div>
  </div>
</div>`;
  }).join('');
}

// ── Integrations ──────────────────────────────────────────────────────────────
function wa(id){const t=tasks.find(x=>x.id===id);if(!t)return;window.open('https://wa.me/?text='+encodeURIComponent(`📌 ${t.text}\n⏰ ${new Date(t.datetime).toLocaleString('he-IL')}`),'_blank')}
function cal(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  const s=new Date(t.datetime),e=new Date(s.getTime()+3600000);
  const f=d=>d.toISOString().replace(/[-:]/g,'').slice(0,15)+'Z';
  window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(t.text)}&dates=${f(s)}/${f(e)}`,'_blank');
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function vibrate(p){try{navigator.vibrate&&navigator.vibrate(p)}catch(e){}}
function toast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('on'),2400);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
render();updateBadge();
</script>
